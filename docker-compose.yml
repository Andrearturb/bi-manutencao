name: bi_manutencao

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bi_manutencao
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bi_manutencao"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/bi_manutencao
      APP_NAME: BI Manutenção API
      APP_VERSION: 0.1.0
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      AUTH_MODE: ${AUTH_MODE:-local}
      ADMIN_PRINCIPAL_EMAIL: ${ADMIN_PRINCIPAL_EMAIL:-admin@empresa.com}
      LOCAL_AUTH_SECRET_KEY: ${LOCAL_AUTH_SECRET_KEY:-dev-local-secret-change-me}
      LOCAL_USERS: ${LOCAL_USERS:-admin@local.test:admin123;analista@local.test:analista123}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      NEXT_PUBLIC_AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  postgres_data:
    name: bi_manutencao_postgres_data